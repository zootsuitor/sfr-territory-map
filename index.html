<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SFR Territory Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <style>
    :root {
      --panel-width: 340px;
      --header-bg: rgba(255,255,255,0.97);
      --shadow: 0 2px 10px rgba(0,0,0,0.18);
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --orphan-red: #ff1a1a;
    }
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #111827; }
    #map { position: absolute; top: 0; left: 0; right: var(--panel-width); bottom: 0; background: #fff; }

    #header {
      position: absolute; top: 12px; left: 12px; z-index: 1000;
      background: var(--header-bg); padding: 10px 14px; border-radius: 10px;
      box-shadow: var(--shadow); font-size: 13px; max-width: 360px;
    }
    #header h1 { margin: 0 0 2px 0; font-size: 15px; font-weight: 600; }
    #header .stats { color: var(--muted); font-size: 11px; line-height: 1.4; }
    #header .pill { display: inline-block; padding: 1px 7px; border-radius: 10px; background: #f3f4f6; margin-right: 4px; font-weight: 500; }
    #header .pill.mine { background: #dbeafe; color: #1e3a8a; }
    #header .pill.orphan { background: #fee2e2; color: #991b1b; }

    /* RIGHT control panel */
    #panel {
      position: absolute; top: 0; right: 0; bottom: 0; width: var(--panel-width);
      background: #fff; border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      box-shadow: -2px 0 10px rgba(0,0,0,0.05);
    }
    #panel-header {
      padding: 12px 14px; border-bottom: 1px solid var(--border);
    }
    #panel-header h2 { margin: 0 0 8px 0; font-size: 14px; font-weight: 600; }
    #panel-header .row { display: flex; gap: 6px; margin-bottom: 6px; }
    #panel-header input[type="search"] {
      flex: 1; padding: 7px 10px; border: 1px solid var(--border);
      border-radius: 6px; font-size: 13px;
    }
    #panel-header input[type="search"]:focus { outline: none; border-color: var(--accent); }
    #panel-header button {
      padding: 6px 10px; border: 1px solid var(--border);
      background: #fff; border-radius: 6px; font-size: 12px;
      cursor: pointer;
    }
    #panel-header button:hover { background: #f9fafb; }
    #panel-header button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    #panel-header .filter-row { display: flex; gap: 4px; font-size: 11px; flex-wrap: wrap; }
    #panel-header .filter-row button { padding: 4px 8px; font-size: 11px; }

    #franchise-list {
      flex: 1; overflow-y: auto; padding: 4px 0;
    }
    .f-row {
      display: flex; align-items: center; padding: 6px 14px;
      gap: 8px; cursor: pointer; font-size: 13px;
      border-bottom: 1px solid #f3f4f6;
    }
    .f-row:hover { background: #f9fafb; }
    .f-row input[type="checkbox"] { cursor: pointer; margin: 0; }
    .f-row .swatch {
      width: 12px; height: 12px; border-radius: 3px;
      border: 1.5px solid #111827; flex-shrink: 0;
    }
    .f-row .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .f-row .count { color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; }
    .f-row.mine { background: #eff6ff; }
    .f-row.mine:hover { background: #dbeafe; }
    .f-row.mine .name { font-weight: 600; }
    .f-row .zoom-btn {
      opacity: 0; transition: opacity 80ms;
      padding: 2px 6px; border: 1px solid var(--border);
      border-radius: 4px; font-size: 10px; background: #fff;
      cursor: pointer;
    }
    .f-row:hover .zoom-btn { opacity: 1; }
    .f-row .zoom-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .orphan-badge { margin-left: 4px; color: var(--orphan-red); font-size: 10px; font-weight: 700; }

    #loading {
      position: absolute; inset: 0; background: rgba(255,255,255,0.95); z-index: 2000;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      font-size: 14px; color: var(--muted);
    }
    #loading .bar { margin-top: 12px; width: 200px; height: 4px; background: #f3f4f6; border-radius: 2px; overflow: hidden; }
    #loading .bar span { display: block; height: 100%; width: 0; background: var(--accent); transition: width 200ms; }

    #legend {
      position: absolute; bottom: 20px; left: 20px; z-index: 1000;
      background: var(--header-bg); padding: 10px 14px; border-radius: 8px;
      box-shadow: var(--shadow); font-size: 12px;
    }
    #legend .row { display: flex; align-items: center; margin: 3px 0; }
    #legend .swatch { width: 14px; height: 14px; margin-right: 8px; border: 2px solid #111827; border-radius: 2px; }
    #legend .orphan-swatch {
      width: 14px; height: 14px; margin-right: 8px;
      background: var(--orphan-red); border: 2px solid #111827;
      border-radius: 50%;
    }

    /* Hover tooltip for ZIP polygons */
    .zip-hover-tip {
      background: #fff !important;
      border: 1px solid #111827 !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2) !important;
      padding: 5px 8px !important;
      font-size: 12px !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
      color: #111827 !important;
      border-radius: 4px !important;
      pointer-events: none !important;
    }
    .zip-hover-tip::before { border-top-color: #111827 !important; }
    .zip-tip { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .zip-tip .swatch-inline {
      width: 10px; height: 10px; border-radius: 2px;
      border: 1.5px solid #111827; flex-shrink: 0;
    }
    .zip-tip .fr { font-weight: 500; color: #374151; }
    .orphan-tip { border-color: var(--orphan-red) !important; }
    .orphan-tip::before { border-top-color: var(--orphan-red) !important; }

    /* compact on small screens */
    @media (max-width: 800px) {
      :root { --panel-width: 260px; }
      #header { max-width: 200px; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div>Loading franchise data…</div>
    <div class="bar"><span id="load-bar"></span></div>
    <div id="load-status" style="margin-top:6px; font-size:11px;"></div>
  </div>

  <div id="header">
    <h1>SFR Territory Map</h1>
    <div class="stats" id="header-stats"></div>
  </div>

  <div id="map"></div>

  <div id="legend">
    <div style="font-weight: 600; margin-bottom: 4px;">Legend</div>
    <div class="row"><span class="swatch" style="background:#1565C0"></span>SFR Raleigh</div>
    <div class="row"><span class="swatch" style="background:#1E88E5"></span>SFR Atlanta</div>
    <div class="row"><span class="swatch" style="background:#43A047"></span>SFR Triad</div>
    <div class="row"><span class="orphan-swatch"></span>Orphan / Gap / Unassigned ZIP</div>
    <div style="margin-top: 6px; color: #888; font-size: 11px;">
      Red = needs attention. Hover any ZIP for details.
    </div>
  </div>

  <aside id="panel">
    <div id="panel-header">
      <h2>Franchises <span id="panel-count" style="color:var(--muted); font-weight:400; font-size:11px;"></span></h2>
      <div class="row">
        <input type="search" id="search" placeholder="Search franchise or ZIP…" />
      </div>
      <div class="filter-row">
        <button id="btn-all">All</button>
        <button id="btn-none">None</button>
        <button id="btn-mine" class="active">Just mine</button>
        <button id="btn-orphans-only">Only orphans</button>
      </div>
    </div>
    <div id="franchise-list"></div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
